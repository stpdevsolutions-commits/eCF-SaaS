version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: ecf_saas_postgres
    environment:
      POSTGRES_USER: ecf_user
      POSTGRES_PASSWORD: ecf_pass_dev
      POSTGRES_DB: ecf_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ecf_saas_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: ecf_saas_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
volumes:
  postgres_data:
